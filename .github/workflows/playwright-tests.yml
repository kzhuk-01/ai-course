name: Playwright Tests

on:
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same PR to avoid wasted minutes.
concurrency:
  group: playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimal permissions: read-only access to repo contents.
permissions:
  contents: read

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true

    steps:
      # 1. Check out the repository at the PR head commit.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up the latest LTS Node.js with npm cache enabled.
      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      # 3. Install dependencies from the lockfile; fail on unexpected changes.
      - name: Install dependencies
        run: npm ci

      # 4. Install Playwright browser binaries along with OS-level system deps.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # 5. Execute the full Playwright test suite in parallel across available workers.
      #    Credentials are stored as GitHub repository secrets and injected here so
      #    EnvHelper can resolve them without a .env file on the runner.
      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}

      # 6. Always upload the HTML report so failures can be inspected after the run.
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      # 7. Always upload trace archives to allow step-level debugging of failures.
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip
          retention-days: 30

      # 8. Notify Microsoft Teams on workflow failure.
      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "@type": "MessageCard",
              "@context": "https://schema.org/extensions",
              "summary": "Playwright Tests Failed",
              "themeColor": "FF0000",
              "title": "Playwright Tests Failed",
              "sections": [
                {
                  "facts": [
                    { "name": "PR Title",  "value": "${{ github.event.pull_request.title }}" },
                    { "name": "Author",    "value": "${{ github.event.pull_request.user.login }}" },
                    { "name": "Branch",    "value": "${{ github.head_ref }}" },
                    { "name": "Run URL",   "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" }
                  ]
                }
              ]
            }'
